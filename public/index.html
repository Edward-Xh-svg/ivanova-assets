<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivanova Platform | المركز الرئيسي</title>
    <link rel="icon" href="grosmen-inses.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --deep-space: #000000;
            --nebula-purple: rgba(128, 0, 128, 0.15);
            --nebula-blue: rgba(0, 0, 255, 0.1);
            --nebula-gold: rgba(255, 215, 0, 0.05);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--deep-space);
            font-family: 'Cairo', sans-serif;
            overflow: hidden; color: white;
            /* خلفية "اصطدام المجرات" باستخدام التدرجات المتحركة */
            background: 
                radial-gradient(circle at 20% 30%, var(--nebula-purple) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, var(--nebula-blue) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, var(--nebula-gold) 0%, transparent 60%);
            background-size: 200% 200%;
            animation: galaxyShift 20s linear infinite;
        }

        @keyframes galaxyShift {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* ستارة التفعيل */
        .portal-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 2s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .portal-overlay.hidden { opacity: 0; visibility: hidden; transform: scale(1.5); filter: blur(20px); }

        .portal-button {
            width: 100px; height: 100px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
        }
        .portal-button::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            border: 2px solid rgba(255,255,255,0.1); border-radius: 50%;
            animation: pulseRing 2s infinite;
        }
        @keyframes pulseRing { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        /* الهيدر */
        .main-header {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between;
            align-items: center; padding: 30px 50px; z-index: 100;
        }
        .header-logo { width: 140px; opacity: 0.5; filter: grayscale(1); transition: 0.5s; }
        .header-logo:hover { opacity: 1; filter: grayscale(0); }

        .apps-menu-btn { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; cursor: pointer; }
        .dot { width: 4px; height: 4px; background: white; border-radius: 50%; opacity: 0.5; }

        .apps-dropdown {
            position: absolute; top: 90px; left: 50px; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(30px); border-radius: 20px; padding: 30px; display: none;
            grid-template-columns: repeat(3, 1fr); gap: 25px; z-index: 1000;
        }
        .apps-dropdown.active { display: grid; animation: fadeIn 0.4s ease; }

        /* الكانفاس للمؤثرات المركزية */
        #visualizerCanvas {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
        }

        /* المحتوى المركزي */
        .main-content {
            position: relative; z-index: 10;
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; pointer-events: none;
        }

        .brand-name {
            font-size: clamp(3rem, 12vw, 8rem); font-weight: 900;
            letter-spacing: -4px; margin: 0;
            background: linear-gradient(to bottom, #fff 40%, rgba(255,255,255,0.1));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 50px rgba(255,255,255,0.15));
        }

        .arrival-date {
            font-size: clamp(0.8rem, 2vw, 1.2rem); font-weight: 200;
            color: rgba(255,255,255,0.3); margin-top: 10px;
            letter-spacing: 12px; text-transform: uppercase;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body id="mainBody">

    <div class="portal-overlay" id="portalOverlay">
        <div class="portal-button" onclick="startExperience()">
            <i class="fa-solid fa-bahai" style="font-size: 1.5rem; color: #fff;"></i>
        </div>
        <p style="margin-top: 30px; letter-spacing: 5px; font-size: 0.6rem; color: #444;">CORE INITIALIZATION</p>
    </div>

    <header class="main-header">
        <div class="apps-menu-btn" onclick="toggleAppsMenu(event)">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <img src="grosmen-fivcon.png" alt="Grosmen Logo" class="header-logo">
    </header>

    <div class="apps-dropdown" id="appsDropdown">
        <a href="https://bacmaroc.ivanova.sbs" class="app-item"><img src="bacmaroc-ovcon.png"><span>BAC MAROC</span></a>
        <a href="https://courses.ivanova.sbs" class="app-item"><img src="courses-ovcon.png"><span>COURSES</span></a>
        <a href="https://wikijobs.ivanova.sbs" class="app-item"><img src="wikijobs-ovcon.png"><span>WIKIJOBS</span></a>
        <a href="https://store.ivanova.sbs" class="app-item"><img src="store-ovcon.png"><span>STORE</span></a>
        <a href="https://news.ivanova.sbs" class="app-item"><img src="news-ovcon.png"><span>NEWS</span></a>
    </div>

    <canvas id="visualizerCanvas"></canvas>

    <div class="main-content">
        <h1 class="brand-name">Grosmen World</h1>
        <p class="arrival-date">Be on time. May 1st.</p>
    </div>

    <audio id="bgAudio" loop src="bacogros.mp3"></audio>

    <script>
        const canvas = document.getElementById('visualizerCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bgAudio');
        let audioContext, analyser, dataArray, source;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function startExperience() {
            document.getElementById('portalOverlay').classList.add('hidden');
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            audio.play();
            draw();
        }

        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const bars = dataArray.length;

            for (let i = 0; i < bars; i++) {
                const barHeight = (dataArray[i] / 255) * (canvas.height * 0.4);
                
                // رسم الأعمدة بشكل متناظر من المركز للأعلى وللأسفل
                // تدرج لوني "مجري"
                const gradient = ctx.createLinearGradient(centerX, centerY - barHeight, centerX, centerY + barHeight);
                gradient.addColorStop(0, 'transparent');
                gradient.addColorStop(0.5, `hsla(${(i * 2) + 240}, 80%, 60%, 0.3)`);
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                
                // توزيع الأعمدة حول المركز
                const xPos = (i * (canvas.width / bars)) * 1.5 - (canvas.width * 0.25);
                ctx.fillRect(xPos, centerY - barHeight, 2, barHeight * 2);
                
                // إضافة توهج خلفي ناعم جداً
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsla(${(i * 2) + 240}, 80%, 60%, 0.1)`;
            }
        }

        function toggleAppsMenu(e) {
            e.stopPropagation();
            document.getElementById('appsDropdown').classList.toggle('active');
        }

        window.onclick = function(event) {
            if (!event.target.closest('.apps-menu-btn') && !event.target.closest('.apps-dropdown')) {
                document.getElementById('appsDropdown').classList.remove('active');
            }
        }
    </script>
</body>
</html>
