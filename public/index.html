<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivanova Platform | المركز الرئيسي</title>
    <link rel="icon" href="grosmen-inses.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #000000;
            --accent-glow: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-deep);
            font-family: 'Cairo', sans-serif;
            overflow: hidden; color: white;
            background: linear-gradient(125deg, #000, #050505, #000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ستارة الدخول - الزر الجذاب */
        .portal-overlay {
            position: fixed; inset: 0;
            background: #000;
            z-index: 9999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .portal-overlay.hidden {
            opacity: 0; visibility: hidden; transform: scale(1.2);
        }

        .portal-button {
            position: relative;
            width: 120px; height: 120px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.5s;
        }

        /* حلقة النبض حول الزر */
        .portal-button::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            animation: pulseRing 3s infinite;
        }

        .portal-button i {
            font-size: 2rem; color: #fff;
            filter: drop-shadow(0 0 10px white);
            transition: 0.3s;
        }

        .portal-button:hover i { transform: scale(1.2); color: #fff; }
        .portal-button span {
            position: absolute; bottom: -40px;
            white-space: nowrap; font-size: 0.7rem;
            letter-spacing: 5px; color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }

        @keyframes pulseRing {
            0% { transform: scale(0.8); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* بقية عناصر الصفحة */
        #visualizerCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1; opacity: 0.4;
        }

        .main-header {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 50px; z-index: 100; background: transparent;
        }

        .header-logo { width: 140px; opacity: 0.7; }

        .apps-menu-btn { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; cursor: pointer; }
        .dot { width: 4px; height: 4px; background: white; border-radius: 50%; }

        .apps-dropdown {
            position: absolute; top: 90px; left: 50px;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(25px);
            border-radius: 20px; padding: 30px; display: none;
            grid-template-columns: repeat(3, 1fr); gap: 25px; z-index: 1000;
        }
        .apps-dropdown.active { display: grid; animation: fadeIn 0.4s ease; }

        .content-wrap {
            position: relative; z-index: 10;
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .brand-name {
            font-size: clamp(3.5rem, 10vw, 7rem); font-weight: 900;
            letter-spacing: -3px; margin: 0;
            background: linear-gradient(to bottom, #fff 50%, rgba(255,255,255,0.1));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .arrival-date {
            font-size: clamp(0.9rem, 2.5vw, 1.2rem); font-weight: 200;
            color: rgba(255,255,255,0.4); margin-top: 15px; letter-spacing: 8px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="portal-overlay" id="portalOverlay">
        <div class="portal-button" onclick="startExperience()">
            <i class="fa-solid fa-power-off"></i>
            <span>Initialize System</span>
        </div>
    </div>

    <header class="main-header">
        <div class="apps-menu-btn" onclick="toggleAppsMenu(event)">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="logo-area">
            <img src="grosmen-fivcon.png" alt="Grosmen Logo" class="header-logo">
        </div>
    </header>

    <div class="apps-dropdown" id="appsDropdown">
        <a href="https://bacmaroc.ivanova.sbs" class="app-item"><img src="bacmaroc-ovcon.png"><span>BAC MAROC</span></a>
        <a href="https://courses.ivanova.sbs" class="app-item"><img src="courses-ovcon.png"><span>COURSES</span></a>
        <a href="https://wikijobs.ivanova.sbs" class="app-item"><img src="wikijobs-ovcon.png"><span>WIKIJOBS</span></a>
        <a href="https://store.ivanova.sbs" class="app-item"><img src="store-ovcon.png"><span>STORE</span></a>
        <a href="https://news.ivanova.sbs" class="app-item"><img src="news-ovcon.png"><span>NEWS</span></a>
    </div>

    <canvas id="visualizerCanvas"></canvas>

    <div class="content-wrap">
        <div style="text-align: center;">
            <h1 class="brand-name">Grosmen World</h1>
            <p class="arrival-date">Be on time. May 1st.</p>
        </div>
    </div>

    <audio id="bgAudio" loop src="bacogros.mp3"></audio>

    <script>
        const canvas = document.getElementById('visualizerCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bgAudio');
        
        let audioContext, analyser, dataArray, source;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function startExperience() {
            document.getElementById('portalOverlay').classList.add('hidden');
            
            // تفعيل نظام الصوت
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 128;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            audio.play();
            draw();
        }

        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / dataArray.length) * 2;
            let x = 0;

            for (let i = 0; i < dataArray.length; i++) {
                const barHeight = (dataArray[i] / 255) * canvas.height * 0.8;
                const gradient = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - barHeight);
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
                gradient.addColorStop(0.5, `hsla(${(i * 5) + 220}, 70%, 50%, 0.1)`);
                gradient.addColorStop(1, `hsla(${(i * 5) + 220}, 80%, 60%, 0.4)`);

                ctx.fillStyle = gradient;
                ctx.fillRect(x, canvas.height - barHeight, barWidth - 4, barHeight);
                x += barWidth;
            }
        }

        function toggleAppsMenu(e) {
            e.stopPropagation();
            document.getElementById('appsDropdown').classList.toggle('active');
        }

        window.onclick = function(event) {
            if (!event.target.closest('.apps-menu-btn') && !event.target.closest('.apps-dropdown')) {
                document.getElementById('appsDropdown').classList.remove('active');
            }
        }
    </script>
</body>
</html>
