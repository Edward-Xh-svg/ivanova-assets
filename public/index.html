<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivanova Platform | المركز الرئيسي</title>
    <link rel="icon" href="grosmen-inses.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-black: #000000;
            --subtle-glow: rgba(255, 255, 255, 0.03);
            --accent-white: rgba(255, 255, 255, 0.8);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-black);
            font-family: 'Cairo', sans-serif;
            overflow: hidden; color: white;
            /* خلفية داكنة جداً مع تدرجات شبه معدومة لعمق بصري فقط */
            background: 
                radial-gradient(circle at 50% 50%, #050505 0%, #000 100%),
                radial-gradient(circle at 20% 80%, #030303 0%, transparent 50%);
        }

        /* ستارة التفعيل الداكنة */
        .portal-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 2s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .portal-overlay.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); filter: blur(30px); }

        .portal-button {
            width: 80px; height: 80px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; border-radius: 50%;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            transition: 0.5s;
        }
        .portal-button:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
        .portal-button::after {
            content: ''; position: absolute; inset: -10px;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 50%;
            animation: pulseRing 3s infinite;
        }
        @keyframes pulseRing { 0% { transform: scale(0.8); opacity: 0; } 50% { opacity: 0.3; } 100% { transform: scale(1.5); opacity: 0; } }

        /* الهيدر */
        .main-header {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between;
            align-items: center; padding: 30px 50px; z-index: 100;
        }
        .header-logo { width: 140px; opacity: 0.4; filter: grayscale(1); transition: 0.5s; }
        .header-logo:hover { opacity: 0.8; filter: grayscale(0); }

        .apps-menu-btn { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; cursor: pointer; }
        .dot { width: 4px; height: 4px; background: white; border-radius: 50%; opacity: 0.3; }

        .apps-dropdown {
            position: absolute; top: 90px; left: 50px; background: rgba(5,5,5,0.95);
            backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; padding: 30px; display: none;
            grid-template-columns: repeat(3, 1fr); gap: 25px; z-index: 1000;
        }
        .apps-dropdown.active { display: grid; animation: fadeIn 0.4s ease; }

        .app-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: white; opacity: 0.6; transition: 0.3s; }
        .app-item:hover { opacity: 1; transform: translateY(-3px); }
        .app-item img { width: 45px; margin-bottom: 10px; }

        /* الكانفاس */
        #visualizerCanvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none; opacity: 0.6;
        }

        /* المحتوى المركزي */
        .main-content {
            position: relative; z-index: 10;
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; pointer-events: none;
        }

        .brand-name {
            font-size: clamp(3rem, 12vw, 8.5rem); font-weight: 900;
            letter-spacing: -5px; margin: 0;
            color: #fff;
            filter: drop-shadow(0 0 40px rgba(255,255,255,0.05));
        }

        .arrival-date {
            font-size: clamp(0.7rem, 2vw, 1rem); font-weight: 200;
            color: rgba(255,255,255,0.2); margin-top: 10px;
            letter-spacing: 15px; text-transform: uppercase;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="portal-overlay" id="portalOverlay">
        <div class="portal-button" onclick="startExperience()">
            <i class="fa-solid fa-play" style="font-size: 1.2rem; color: #fff; margin-right: -3px;"></i>
        </div>
        <p style="margin-top: 25px; letter-spacing: 8px; font-size: 0.55rem; color: #333; font-weight: 600;">ENTER THE VOID</p>
    </div>

    <header class="main-header">
        <div class="apps-menu-btn" onclick="toggleAppsMenu(event)">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <img src="grosmen-fivcon.png" alt="Grosmen Logo" class="header-logo">
    </header>

    <div class="apps-dropdown" id="appsDropdown">
        <a href="https://bacmaroc.ivanova.sbs" class="app-item"><img src="bacmaroc-ovcon.png"><span>BAC MAROC</span></a>
        <a href="https://courses.ivanova.sbs" class="app-item"><img src="courses-ovcon.png"><span>COURSES</span></a>
        <a href="https://wikijobs.ivanova.sbs" class="app-item"><img src="wikijobs-ovcon.png"><span>WIKIJOBS</span></a>
        <a href="https://store.ivanova.sbs" class="app-item"><img src="store-ovcon.png"><span>STORE</span></a>
        <a href="https://news.ivanova.sbs" class="app-item"><img src="news-ovcon.png"><span>NEWS</span></a>
    </div>

    <canvas id="visualizerCanvas"></canvas>

    <div class="main-content">
        <h1 class="brand-name">Grosmen World</h1>
        <p class="arrival-date">Be on time. May 1st.</p>
    </div>

    <audio id="bgAudio" loop src="bacogros.mp3"></audio>

    <script>
        const canvas = document.getElementById('visualizerCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bgAudio');
        let audioContext, analyser, dataArray, source;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function startExperience() {
            document.getElementById('portalOverlay').classList.add('hidden');
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 128; // أعمدة أقل لمظهر أكثر حدة ونظافة
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            audio.play();
            draw();
        }

        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const bars = dataArray.length;

            for (let i = 0; i < bars; i++) {
                const barHeight = (dataArray[i] / 255) * (canvas.height * 0.45);
                
                // تدرج أبيض شفاف جداً للأعمدة (نمط داكن نقي)
                const gradient = ctx.createLinearGradient(0, centerY - barHeight, 0, centerY + barHeight);
                gradient.addColorStop(0, 'transparent');
                gradient.addColorStop(0.5, `rgba(255, 255, 255, ${dataArray[i]/800})`); // توهج خفيف جداً
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                
                // توزيع الأعمدة بمسافات متساوية وبشكل حاد
                const barWidth = 2;
                const xPos = (i * (canvas.width / bars));
                ctx.fillRect(xPos, centerY - barHeight, barWidth, barHeight * 2);
            }
        }

        function toggleAppsMenu(e) {
            e.stopPropagation();
            document.getElementById('appsDropdown').classList.toggle('active');
        }

        window.onclick = function(event) {
            if (!event.target.closest('.apps-menu-btn') && !event.target.closest('.apps-dropdown')) {
                document.getElementById('appsDropdown').classList.remove('active');
            }
        }
    </script>
</body>
</html>
