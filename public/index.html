<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivanova Platform | المركز الرئيسي</title>
    <link rel="icon" href="grosmen-inses.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ffffff;
            --glass: rgba(0, 0, 0, 0.4);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: 'Cairo', sans-serif;
            overflow: hidden; color: white;
            display: flex; flex-direction: column;
        }

        /* الخلفية المتحركة (الموجات اللونية) */
        .bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; filter: blur(80px); opacity: 0.6;
        }

        /* واجهة اللوحة الزجاجية العائمة */
        .main-container {
            position: relative; z-index: 10;
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .glass-panel {
            padding: 60px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            text-align: center;
            /* تلاشي الحدود لتبدو بلا نهاية */
            box-shadow: 0 0 100px rgba(0,0,0,0.5); 
            transition: 0.5s;
        }

        .brand-title {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            letter-spacing: -2px;
            margin: 0;
            background: linear-gradient(to bottom, #fff 40%, rgba(255,255,255,0.2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .countdown-text {
            font-size: clamp(1rem, 3vw, 1.5rem);
            font-weight: 400;
            color: rgba(255,255,255,0.5);
            margin-top: 20px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* الهيدر المدمج */
        .main-header {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 50px; z-index: 100; background: transparent;
        }

        .header-logo { width: 140px; opacity: 0.8; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }

        .apps-menu-btn {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;
            cursor: pointer; padding: 15px; transition: 0.3s;
        }
        .apps-menu-btn:hover { transform: scale(1.1); }
        .dot { width: 4px; height: 4px; background: white; border-radius: 50%; box-shadow: 0 0 10px white; }

        .apps-dropdown {
            position: absolute; top: 90px; left: 50px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px; padding: 30px;
            display: none; grid-template-columns: repeat(3, 1fr); gap: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .apps-dropdown.active { display: grid; animation: slideIn 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }

        .app-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: white; transition: 0.3s; }
        .app-item:hover { transform: translateY(-5px); opacity: 0.7; }
        .app-item img { width: 45px; margin-bottom: 12px; }
        .app-item span { font-size: 11px; font-weight: 600; opacity: 0.8; }

        /* نبض الصوت السفلي */
        .audio-visualizer {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 150px;
            z-index: 2; pointer-events: none; opacity: 0.4;
        }

        /* مشغل الصوت الخفي */
        #bgAudio { display: none; }

        .experience-trigger {
            position: fixed; inset: 0; z-index: 9999;
            background: #000; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 1s;
        }
        .experience-trigger.hidden { opacity: 0; pointer-events: none; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="experience-trigger" id="trigger" onclick="startExperience()">
        <span style="font-size: 0.8rem; letter-spacing: 3px; color: #555;">CLICK TO ENTER IVANOVA</span>
    </div>

    <header class="main-header">
        <div class="apps-menu-btn" onclick="toggleAppsMenu()">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="logo-area">
            <img src="grosmen-fivcon.png" alt="Grosmen Logo" class="header-logo">
        </div>
    </header>

    <div class="apps-dropdown" id="appsDropdown">
        <a href="https://bacmaroc.ivanova.sbs" class="app-item"><img src="bacmaroc-ovcon.png"><span>BAC MAROC</span></a>
        <a href="https://courses.ivanova.sbs" class="app-item"><img src="courses-ovcon.png"><span>COURSES</span></a>
        <a href="https://wikijobs.ivanova.sbs" class="app-item"><img src="wikijobs-ovcon.png"><span>WIKIJOBS</span></a>
        <a href="https://store.ivanova.sbs" class="app-item"><img src="store-ovcon.png"><span>STORE</span></a>
        <a href="https://news.ivanova.sbs" class="app-item"><img src="news-ovcon.png"><span>NEWS</span></a>
    </div>

    <canvas class="bg-canvas" id="canvas"></canvas>

    <div class="main-container">
        <div class="glass-panel">
            <h1 class="brand-title">Grosmen World</h1>
            <div class="countdown-text">Be on time. May 1st.</div>
        </div>
    </div>

    <canvas class="audio-visualizer" id="visualizer"></canvas>

    <audio id="bgAudio" loop>
        <source src="bacogros.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const visualizer = document.getElementById('visualizer');
        const vCtx = visualizer.getContext('2d');
        const audio = document.getElementById('bgAudio');
        
        let audioContext, analyser, dataArray;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            visualizer.width = window.innerWidth;
            visualizer.height = 150;
        }
        window.onresize = resize;
        resize();

        // تفعيل التجربة
        function startExperience() {
            document.getElementById('trigger').classList.add('hidden');
            audio.play();
            setupAudioContext();
            animate();
        }

        function setupAudioContext() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaElementSource(audio);
            analyser = audioContext.createAnalyser();
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }

        let hue = 0;
        function animate() {
            // رسم الموجات اللونية في الخلفية
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            analyser.getByteFrequencyData(dataArray);
            
            const avgFrequency = dataArray.reduce((a, b) => a + b) / dataArray.length;
            const size = avgFrequency * 2.5;

            // موجات عائمة
            for(let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.arc(canvas.width/2 + Math.sin(Date.now()*0.001 + i)*100, 
                        canvas.height/2 + Math.cos(Date.now()*0.001 + i)*100, 
                        size + (i*100), 0, Math.PI*2);
                ctx.fillStyle = `hsla(${(hue + i*60) % 360}, 70%, 50%, 0.1)`;
                ctx.fill();
            }
            hue += 0.5;

            // رسم مصور الصوت السفلي (الموجات)
            vCtx.clearRect(0, 0, visualizer.width, visualizer.height);
            vCtx.beginPath();
            vCtx.moveTo(0, visualizer.height / 2);
            
            for (let i = 0; i < dataArray.length; i++) {
                const x = (visualizer.width / dataArray.length) * i;
                const y = (visualizer.height / 2) + (Math.sin(i * 0.1 + Date.now()*0.005) * (dataArray[i]/4));
                vCtx.lineTo(x, y);
            }
            vCtx.strokeStyle = 'rgba(255,255,255,0.2)';
            vCtx.lineWidth = 2;
            vCtx.stroke();

            requestAnimationFrame(animate);
        }

        function toggleAppsMenu() {
            document.getElementById('appsDropdown').classList.toggle('active');
        }

        // إغلاق القائمة عند النقر في الخارج
        window.onclick = function(event) {
            if (!event.target.closest('.apps-menu-btn') && !event.target.closest('.apps-dropdown')) {
                document.getElementById('appsDropdown').classList.remove('active');
            }
        }
    </script>
</body>
</html>
